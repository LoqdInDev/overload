<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overload — Launch Checklist</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #FBF7F0;
    --dark: #2C2825;
    --ink: #332F2B;
    --terra: #C45D3E;
    --terra-light: #D97B5A;
    --sage: #5E8E6E;
    --muted: #94908A;
    --surface: #FFFFFF;
    --sand: #EDE5DA;
    --blush: #F5EDE6;
    --red: #E74C3C;
    --amber: #F0A830;
    --green: #27AE60;
  }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    background: var(--dark);
    padding: 40px 24px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(196,93,62,0.15) 0%, transparent 70%);
    filter: blur(60px);
    pointer-events: none;
  }
  .header-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    border-radius: 100px;
    background: rgba(196,93,62,0.12);
    border: 1px solid rgba(196,93,62,0.2);
    font-size: 11px;
    font-weight: 700;
    color: var(--terra-light);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 20px;
    position: relative;
  }
  .header h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 400;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin-bottom: 12px;
    position: relative;
  }
  .header h1 span { color: rgba(255,255,255,0.45); }
  .header-sub {
    font-size: 15px;
    color: rgba(255,255,255,0.4);
    max-width: 500px;
    margin: 0 auto;
    position: relative;
  }

  /* Progress bar */
  .progress-wrap {
    background: var(--surface);
    border-bottom: 1px solid rgba(44,40,37,0.06);
    padding: 20px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(16px);
    background: rgba(255,255,255,0.9);
  }
  .progress-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .progress-bar {
    flex: 1;
    height: 8px;
    border-radius: 8px;
    background: var(--sand);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 8px;
    background: linear-gradient(90deg, var(--terra), var(--sage));
    transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    width: 0%;
  }
  .progress-text {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    white-space: nowrap;
    min-width: 110px;
    text-align: right;
  }
  .progress-text span { color: var(--terra); }

  /* Stats row */
  .stats-row {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 24px 24px 0;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid rgba(44,40,37,0.05);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
  }
  .stat-val {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 28px;
    font-weight: 400;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .stat-critical .stat-val { color: var(--red); }
  .stat-high .stat-val { color: var(--amber); }
  .stat-nice .stat-val { color: var(--sage); }
  .stat-done .stat-val { color: var(--terra); }

  /* Main content */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* Section */
  .section {
    margin-bottom: 32px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
    cursor: pointer;
    user-select: none;
  }
  .section-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .section-icon {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .section-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .section-count {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    background: var(--sand);
    padding: 4px 12px;
    border-radius: 100px;
    white-space: nowrap;
  }
  .section-priority {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 100px;
    white-space: nowrap;
  }
  .priority-critical {
    background: rgba(231,76,60,0.08);
    color: var(--red);
    border: 1px solid rgba(231,76,60,0.15);
  }
  .priority-high {
    background: rgba(240,168,48,0.08);
    color: var(--amber);
    border: 1px solid rgba(240,168,48,0.15);
  }
  .priority-nice {
    background: rgba(94,142,110,0.08);
    color: var(--sage);
    border: 1px solid rgba(94,142,110,0.12);
  }
  .section-chevron {
    transition: transform 0.3s ease;
    color: var(--muted);
  }
  .section.collapsed .section-chevron { transform: rotate(-90deg); }
  .section.collapsed .section-items { display: none; }

  /* Items */
  .section-items {
    display: flex;
    flex-direction: column;
    gap: 0;
    background: var(--surface);
    border: 1px solid rgba(44,40,37,0.05);
    border-radius: 18px;
    overflow: hidden;
  }
  .item-container + .item-container { border-top: 1px solid rgba(44,40,37,0.04); }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 20px;
    cursor: pointer;
    transition: background 0.2s ease;
    position: relative;
  }
  .item:hover { background: rgba(44,40,37,0.015); }
  .item.checked { opacity: 0.5; }
  .item.checked .item-text { text-decoration: line-through; }

  /* Checkbox */
  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 7px;
    border: 2px solid rgba(44,40,37,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.25s ease;
    background: transparent;
  }
  .item:hover .checkbox { border-color: rgba(44,40,37,0.3); }
  .item.checked .checkbox {
    background: var(--sage);
    border-color: var(--sage);
  }
  .checkbox svg {
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .item.checked .checkbox svg { opacity: 1; }

  .item-text {
    font-size: 14px;
    color: var(--ink);
    line-height: 1.55;
    flex: 1;
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 7px 16px;
    border-radius: 100px;
    border: 1px solid rgba(44,40,37,0.08);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .filter-btn:hover {
    border-color: rgba(44,40,37,0.2);
    color: var(--ink);
  }
  .filter-btn.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  /* Guide dropdown */
  .item-row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    flex: 1;
    min-width: 0;
  }
  .item-wrap {
    padding: 14px 20px;
    cursor: pointer;
    transition: background 0.2s ease;
    position: relative;
  }
  .item-wrap:hover { background: rgba(44,40,37,0.015); }
  .item-wrap + .item-wrap { border-top: 1px solid rgba(44,40,37,0.04); }
  .item-wrap.checked { opacity: 0.5; }
  .item-wrap.checked .item-text { text-decoration: line-through; }
  .item-wrap.checked .checkbox { background: var(--sage); border-color: var(--sage); }
  .item-wrap.checked .checkbox svg { opacity: 1; }
  .item-wrap:hover .checkbox { border-color: rgba(44,40,37,0.3); }

  .guide-toggle {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 8px;
    border: 1px solid rgba(44,40,37,0.08);
    background: rgba(94,142,110,0.06);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--sage);
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .guide-toggle:hover {
    background: rgba(94,142,110,0.12);
    border-color: rgba(94,142,110,0.2);
  }
  .guide-toggle svg {
    transition: transform 0.25s ease;
  }
  .guide-toggle.open svg {
    transform: rotate(180deg);
  }

  .guide-panel {
    display: none;
    padding: 12px 20px 16px 56px;
    background: rgba(94,142,110,0.03);
    border-top: 1px dashed rgba(94,142,110,0.12);
    animation: guideFadeIn 0.25s ease;
  }
  .guide-panel.open { display: block; }
  @keyframes guideFadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .guide-panel ol {
    margin: 0;
    padding-left: 18px;
  }
  .guide-panel li {
    font-size: 12.5px;
    color: var(--ink);
    line-height: 1.65;
    margin-bottom: 6px;
  }
  .guide-panel li:last-child { margin-bottom: 0; }
  .guide-panel code {
    font-size: 11px;
    background: rgba(44,40,37,0.06);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--terra);
  }
  .guide-panel .guide-tip {
    margin-top: 10px;
    padding: 8px 12px;
    background: rgba(240,168,48,0.06);
    border: 1px solid rgba(240,168,48,0.1);
    border-radius: 8px;
    font-size: 11.5px;
    color: var(--amber);
    font-weight: 500;
  }

  /* Responsive */
  @media (max-width: 640px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .section-header { flex-wrap: wrap; }
    .progress-inner { flex-direction: column; gap: 8px; align-items: stretch; }
    .progress-text { text-align: left; }
    .guide-panel { padding-left: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Pre-Launch Checklist</div>
  <h1>Overload <span>Launch Readiness</span></h1>
  <p class="header-sub">Every single thing needed before going live. Check items off as you complete them — progress is saved locally.</p>
</div>

<div class="progress-wrap">
  <div class="progress-inner">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text"><span id="progressCount">0</span> / <span id="progressTotal">0</span> completed</div>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card stat-critical"><div class="stat-val" id="statCritical">0</div><div class="stat-label">Critical Left</div></div>
  <div class="stat-card stat-high"><div class="stat-val" id="statHigh">0</div><div class="stat-label">High Left</div></div>
  <div class="stat-card stat-nice"><div class="stat-val" id="statNice">0</div><div class="stat-label">Nice-to-Have</div></div>
  <div class="stat-card stat-done"><div class="stat-val" id="statPercent">0%</div><div class="stat-label">Complete</div></div>
</div>

<div class="main">
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
    <button class="filter-btn" data-filter="done">Done</button>
    <button class="filter-btn priority-critical" data-filter="critical" style="background:rgba(231,76,60,0.06)">Critical</button>
    <button class="filter-btn priority-high" data-filter="high" style="background:rgba(240,168,48,0.06)">High Priority</button>
    <button class="filter-btn priority-nice" data-filter="nice" style="background:rgba(94,142,110,0.06)">Nice-to-Have</button>
  </div>
  <div id="sections"></div>
</div>

<script>
const DATA = [
  {

      "Set ANTHROPIC_API_KEY in production env",

      "Set JWT_SECRET (strong random value, never fallback to random)",

    ]
  },
  {
    title: "Authentication & Security",
    icon: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
    color: "196,93,62",
    priority: "critical",
    items: [
      "Disable or protect POST /api/auth/auto-login endpoint in production",

      "Audit all routes — confirm no protected endpoints are accidentally public"
    ]
  },
  {

  {

  },
  {
    title: "Frontend & Client",
    icon: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>`,

    priority: "critical",
    items: [

function getItemId(si, ii) { return `s${si}-i${ii}`; }

function updateStats() {
  let total = 0, done = 0;
  const remaining = { critical: 0, high: 0, nice: 0 };

  DATA.forEach((section, si) => {
    section.items.forEach((_, ii) => {
      total++;
      const id = getItemId(si, ii);
      if (checked[id]) {
        done++;
      } else {
        remaining[section.priority]++;
      }
    });
    // Update section count
    const sectionDone = section.items.filter((_, ii) => checked[getItemId(si, ii)]).length;
    const countEl = document.getElementById(`count-${si}`);
    if (countEl) countEl.textContent = `${sectionDone} / ${section.items.length}`;
  });

  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressCount").textContent = done;
  document.getElementById("progressTotal").textContent = total;
  document.getElementById("statCritical").textContent = remaining.critical;
  document.getElementById("statHigh").textContent = remaining.high;
  document.getElementById("statNice").textContent = remaining.nice;
  document.getElementById("statPercent").textContent = pct + "%";
}

function applyFilter(filter) {
  document.querySelectorAll(".section").forEach(sec => {
    const priority = sec.dataset.priority;
    const containers = sec.querySelectorAll(".item-container");
    let visibleCount = 0;

    containers.forEach(container => {
      const item = container.querySelector(".item");
      let show = true;
      if (filter === "pending") show = !item.classList.contains("checked");
      else if (filter === "done") show = item.classList.contains("checked");
      else if (filter === "critical") show = priority === "critical";
      else if (filter === "high") show = priority === "high";
      else if (filter === "nice") show = priority === "nice";
      container.style.display = show ? "" : "none";
      if (show) visibleCount++;
    });

    sec.style.display = (filter === "all" || visibleCount > 0) ? "" : "none";
    if (filter === "critical" || filter === "high" || filter === "nice") {
      sec.style.display = priority === filter ? "" : "none";
    }
  });

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.filter === filter);
  });
}

function render() {
  const container = document.getElementById("sections");
  container.innerHTML = "";

  DATA.forEach((section, si) => {
    const sec = document.createElement("div");
    sec.className = "section";
    sec.dataset.priority = section.priority;

    const priorityClass = `priority-${section.priority}`;

    sec.innerHTML = `
      <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <div class="section-left">
          <div class="section-icon" style="background:rgba(${section.color},0.08);border:1px solid rgba(${section.color},0.12);color:rgb(${section.color})">
            ${section.icon}
          </div>
          <div>
            <div class="section-title">${section.title}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="section-priority ${priorityClass}">${PRIORITY_LABELS[section.priority]}</span>
          <span class="section-count" id="count-${si}">0 / ${section.items.length}</span>
          <svg class="section-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="section-items">
        ${section.items.map((item, ii) => {
          const id = getItemId(si, ii);
          const isChecked = checked[id];
          const guide = GUIDES[id];
          const hasGuide = guide && !isChecked;
          return `
            <div class="item-container" data-id="${id}">
              <div class="item ${isChecked ? 'checked' : ''}" onclick="toggleItem(this, '${id}')">
                <div class="checkbox">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <div class="item-text">${item}</div>
                ${hasGuide ? `<button class="guide-toggle" onclick="event.stopPropagation(); toggleGuide('${id}', this)" title="Show step-by-step guide">
                  How-to
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>` : ''}
              </div>
              ${hasGuide ? `<div class="guide-panel" id="guide-${id}">
                <ol>${guide.map(step => {
                  if (step.startsWith('tip:')) {
                    return '';
                  }
                  return '<li>' + step + '</li>';
                }).filter(Boolean).join('')}</ol>
                ${guide.find(s => s.startsWith('tip:')) ? '<div class="guide-tip">💡 ' + guide.find(s => s.startsWith('tip:')).slice(4) + '</div>' : ''}
              </div>` : ''}
            </div>
          `;
        }).join("")}
      </div>
    `;
    container.appendChild(sec);
  });

  updateStats();
}

function toggleItem(el, id) {
  checked[id] = !checked[id];
  el.classList.toggle("checked", checked[id]);
  save();
  updateStats();
}

function toggleGuide(id, btn) {
  const panel = document.getElementById('guide-' + id);
  if (!panel) return;
  const isOpen = panel.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
}

// Filter buttons
document.querySelector(".filter-bar").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (btn) applyFilter(btn.dataset.filter);
});

render();
</script>
</body>
</html>
